<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Note Created</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; }
        .note { background: #f5f5f5; padding: 20px; border-radius: 6px; }
        a { color: steelblue; }
    </style>
</head>
<body>
    <h1>Note Saved</h1>

    <div class="note">
        <h2>{{ title }}</h2>
        <p>{{ body }}</p>
    </div>

    <br>
    <a href="/">Create another</a>
</body>
</html>
