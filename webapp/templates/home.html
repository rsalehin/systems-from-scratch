<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes</title>
    <style>
        body       { font-family: sans-serif; max-width: 600px; margin: 60px auto; }
        input, textarea { width: 100%; padding: 8px; margin: 8px 0 16px;
                          box-sizing: border-box; font-size: 1rem; }
        button     { padding: 10px 24px; background: steelblue;
                     color: white; border: none; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .errors    { background: #fff0f0; border: 1px solid #f99;
                     padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .errors p  { margin: 4px 0; color: #c00; }
        .note-list { margin-top: 40px; }
        .note-item { padding: 12px; border-bottom: 1px solid #eee; }
        .new-note  { background: #f0fff4; }
        a          { color: steelblue; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Create a Note</h1>

    <div id="error-box" class="errors" style="display:none"></div>

    <form id="note-form">
        <label>Title</label>
        <input type="text" id="title" name="title"
               placeholder="Note title" maxlength="100">

        <label>Body</label>
        <textarea id="body" name="body"
                  rows="5" placeholder="Write your note..."></textarea>

        <button type="submit" id="submit-btn">Save Note</button>
    </form>

    <div class="note-list">
        <h2>All Notes</h2>
        <div id="notes-container">
            {% if notes %}
                {% for note in notes %}
                <div class="note-item">
                    <a href="/note/{{ note['short_id'] }}">{{ note['title'] }}</a>
                    <small> — {{ note['created_at'] }}</small>
                </div>
                {% endfor %}
            {% else %}
                <p id="empty-msg">No notes yet.</p>
            {% endif %}
        </div>
    </div>

    <script>
        // Get references to DOM elements we'll need
        const form       = document.getElementById("note-form")
        const titleInput = document.getElementById("title")
        const bodyInput  = document.getElementById("body")
        const submitBtn  = document.getElementById("submit-btn")
        const errorBox   = document.getElementById("error-box")
        const container  = document.getElementById("notes-container")

        // Listen for the form's submit event
        form.addEventListener("submit", async function(event) {

            // CRITICAL: prevent the browser's default behaviour
            // Without this, the browser would send a normal POST and reload the page
            event.preventDefault()

            // Disable button so the user can't submit twice
            submitBtn.disabled = true
            submitBtn.textContent = "Saving..."

            // Hide any previous errors
            errorBox.style.display = "none"
            errorBox.innerHTML = ""

            // Read field values directly from DOM objects
            const title = titleInput.value
            const body  = bodyInput.value

            // Build form data — same format as a normal HTML form POST
            const formData = new FormData()
            formData.append("title", title)
            formData.append("body", body)

            // Send the request in the background
            const response = await fetch("/note", {
                method: "POST",
                body:   formData
            })

            // Parse the JSON response body
            const data = await response.json()

            if (!data.ok) {
                // Show validation errors
                data.errors.forEach(function(error) {
                    const p = document.createElement("p")
                    p.textContent = error   // textContent is safe — no XSS
                    errorBox.appendChild(p)
                })
                errorBox.style.display = "block"

            } else {
                // Build a new note item and insert at the top of the list
                const emptyMsg = document.getElementById("empty-msg")
                if (emptyMsg) emptyMsg.remove()

                const noteItem = document.createElement("div")
                noteItem.className = "note-item new-note"
                noteItem.innerHTML = `
                    <a href="/note/${data.short_id}">${escapeHtml(data.title)}</a>
                    <small> — just now</small>
                `

                // Insert before the first existing note
                container.insertBefore(noteItem, container.firstChild)

                // Clear the form
                titleInput.value = ""
                bodyInput.value  = ""
                titleInput.focus()
            }

            // Re-enable the button
            submitBtn.disabled = false
            submitBtn.textContent = "Save Note"
        })

        // Escape HTML in JavaScript — same protection Jinja2 gives us in templates
        function escapeHtml(text) {
            const div = document.createElement("div")
            div.textContent = text
            return div.innerHTML
        }
    </script>
</body>
</html>
